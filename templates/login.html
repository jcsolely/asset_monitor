<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>登录 - 资产监控</title>
    <script src="./static/js/vue.global.js"></script>
    <script src="./static/js/tailwindcss.js"></script>
    <style>
        * {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', sans-serif;
            -webkit-tap-highlight-color: transparent;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }
        
        [v-cloak] { display: none; }
        
        body {
            background: #f5f7fa;
            min-height: 100vh;
            color: #1a1a2e;
        }
        
        .card {
            background: #ffffff;
            border: 1px solid #e8ecf1;
            border-radius: 16px;
            box-shadow: 0 2px 12px rgba(0, 0, 0, 0.04);
        }
        
        .toast {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(26, 26, 46, 0.9);
            color: white;
            padding: 14px 24px;
            border-radius: 12px;
            font-size: 14px;
            font-weight: 500;
            z-index: 9999;
            pointer-events: none;
            animation: toastIn 0.3s ease forwards;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.2);
        }
        
        @keyframes toastIn {
            0% { opacity: 0; transform: translate(-50%, -50%) scale(0.9); }
            100% { opacity: 1; transform: translate(-50%, -50%) scale(1); }
        }
        
        .loading-spinner {
            width: 20px;
            height: 20px;
            border: 2px solid rgba(255, 255, 255, 0.3);
            border-top-color: white;
            border-radius: 50%;
            animation: spin 0.7s linear infinite;
        }
        
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        
        .input-field {
            width: 100%;
            padding: 10px 14px;
            border: 1px solid #e5e7eb;
            border-radius: 10px;
            font-size: 14px;
            color: #1a1a2e;
            background: #f9fafb;
            transition: all 0.2s ease;
            outline: none;
        }
        
        .input-field:focus {
            border-color: #3b82f6;
            background: white;
            box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.1);
        }
        
        .input-field::placeholder {
            color: #9ca3af;
        }
        
        .btn-primary {
            width: 100%;
            padding: 11px 20px;
            background: #3b82f6;
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        
        .btn-primary:hover {
            background: #2563eb;
        }
        
        .btn-primary:active {
            transform: scale(0.98);
        }
        
        .btn-primary:disabled {
            background: #93c5fd;
            cursor: not-allowed;
            transform: none;
        }
    </style>
</head>
<body>
    <div id="app" v-cloak class="min-h-screen flex items-center justify-center px-4 py-8">
        <!-- Toast 提示 -->
        <div v-if="toastMessage" class="toast">{{ toastMessage }}</div>
        
        <!-- 登录卡片 -->
        <div class="w-full max-w-sm">
            <!-- Logo 和标题 -->
            <div class="text-center mb-6">
                <div class="w-14 h-14 mx-auto mb-3 rounded-2xl bg-blue-600 flex items-center justify-center">
                    <span class="text-white text-2xl">📱</span>
                </div>
                <h1 class="text-xl font-semibold text-gray-900">资产监控</h1>
                <p class="text-sm text-gray-500 mt-1">登录您的账户</p>
            </div>

            <!-- 已登录提示框 -->
            <div v-if="isLoggedIn" class="card p-6 text-center">
                <div class="w-14 h-14 mx-auto mb-3 rounded-full bg-green-50 flex items-center justify-center">
                    <span class="text-green-500 text-2xl">✓</span>
                </div>
                <p class="text-gray-700 text-sm font-medium mb-1">检测到已登录</p>
                <p class="text-gray-400 text-xs mb-4">
                    <span class="text-blue-600 font-semibold">{{ countdown }}</span> 秒后自动跳转
                </p>
                <button @click="goToIndex" class="text-blue-600 hover:text-blue-700 text-sm font-medium">
                    立即跳转 →
                </button>
            </div>

            <!-- 登录表单 -->
            <div v-else class="card p-5">
                <form @submit.prevent="handleLogin" class="space-y-4">
                    <!-- CSRF令牌隐藏字段 -->
                    <input type="hidden" :value="csrfToken" name="csrf_token">

                    <!-- Token -->
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1.5">Token</label>
                        <textarea
                            v-model="form.token"
                            placeholder="请输入Token"
                            rows="3"
                            class="input-field resize-none"
                            required
                        ></textarea>
                        <p v-if="errors.token" class="text-red-500 text-xs mt-1">{{ errors.token }}</p>
                    </div>

                    <!-- 登录按钮 -->
                    <button
                        type="submit"
                        :disabled="loading"
                        class="btn-primary flex items-center justify-center gap-2"
                    >
                        <div v-if="loading" class="loading-spinner"></div>
                        <span>{{ loading ? '登录中...' : '登录' }}</span>
                    </button>
                </form>
            </div>

            <!-- 页脚 -->
            <p class="text-center text-gray-400 text-xs mt-6">数据仅供参考，以官方数据为准</p>
        </div>
    </div>

    <script>
        const { createApp } = Vue;

        createApp({
            data() {
                return {
                    form: {
                        token: ''
                    },
                    csrfToken: '',
                    loading: false,
                    error: '',
                    errors: {},
                    isLoggedIn: false,
                    countdown: 3,
                    toastMessage: '',
                    toastTimer: null
                };
            },
            methods: {
                // ========== 工具类方法 ==========
                showToast(message) {
                    this.toastMessage = message;
                    if (this.toastTimer) clearTimeout(this.toastTimer);
                    this.toastTimer = setTimeout(() => { this.toastMessage = ''; }, 2000);
                },
                getApiBase() {
                    const path = window.location.pathname;
                    const base = /\/[^/]*\.[^/]+$/.test(path)
                        ? path.replace(/\/[^/]*\.[^/]*$/, '')
                        : path.replace(/\/[^/]*$/, '');
                    return base.replace(/\/$/, '') + '/api';
                },

                // ========== 认证相关 ==========
                async getCsrfToken() {
                    try {
                        const res = await fetch(this.getApiBase() + '/csrf-token');
                        const data = await res.json();
                        if (data.status === 'success') this.csrfToken = data.token;
                    } catch (e) { /* 获取失败 */ }
                },
                async checkLogin() {
                    try {
                        const res = await fetch(this.getApiBase() + '/check-login', {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json' }
                        });
                        if (res.status === 200) {
                            this.isLoggedIn = true;
                            this.startCountdown();
                            return;
                        }
                    } catch (e) { /* 未登录 */ }
                    this.csrfToken = '';
                },

                // ========== 页面跳转 ==========
                startCountdown() {
                    const timer = setInterval(() => {
                        if (this.countdown <= 1) {
                            clearInterval(timer);
                            this.goToIndex();
                        } else {
                            this.countdown--;
                        }
                    }, 1000);
                },
                goToIndex() {
                    window.location.href = window.location.pathname.replace(/\/[^/]*$/, '/');
                },

                // ========== 登录逻辑 ==========
                validateForm() {
                    this.errors = {};
                    if (!this.form.token) this.errors.token = '请输入Token';
                    return Object.keys(this.errors).length === 0;
                },
                async handleLogin() {
                    this.error = '';
                    if (!this.validateForm()) return;
                    
                    this.loading = true;
                    try {
                        const response = await fetch(this.getApiBase() + '/login', {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify({
                                token: this.form.token,
                                csrf_token: this.csrfToken
                            })
                        });
                        const result = await response.json();
                        
                        if (result.status === 'success') {
                            // 延迟跳转，确保响应完全处理
                            setTimeout(() => {
                                window.location.href = window.location.pathname.replace(/\/[^/]*$/, '/');
                            }, 100);
                        } else {
                            this.showToast(result.msg || '登录失败，请重试');
                            await this.getCsrfToken();
                        }
                    } catch (err) {
                        this.showToast('网络请求失败：' + err.message);
                    } finally {
                        this.loading = false;
                    }
                }
            },
            mounted() {
                this.checkLogin();
            }
        }).mount('#app');
    </script>
</body>
</html>
